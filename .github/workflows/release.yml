name: Release

# Fires when a version tag is pushed (e.g. `v0.1.59`). The release artifact is
# built and published HERE, on CI — never from a developer's machine — so what
# ships is exactly what a clean, gated checkout produces. The integration tests
# (Docker, Linux) run in ci.yml on the same commit's push to main, which precedes
# the tag; this job is the Windows gate plus the packaging/publish step.
on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

# Needed for `gh release create` to create the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    name: gate · build · package · publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # ── Gate: identical to ci.yml's build job, so a red tree never publishes ──
      - name: Build
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # ── Build both shippable binaries (release profile) ──
      - name: Build app (release)
        run: cargo build --release -p adit-app

      # The RDP helper is a SEPARATE workspace (own Cargo.lock); it must be built
      # with its own manifest, not `-p`. See crates/adit-rdp.
      - name: Build RDP helper (release)
        run: cargo build --release --manifest-path crates/adit-rdp/Cargo.toml

      # ── Package the Inno Setup installer ──
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Derive version from tag
        id: ver
        shell: bash
        # refs/tags/v0.1.59 -> 0.1.59
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.ver.outputs.version }}" installer\adit.iss'

      # ── Publish the GitHub Release with the installer attached ──
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          "target/release/adit-installer-v${{ steps.ver.outputs.version }}.exe"
          --title "Adit ${{ github.ref_name }}"
          --generate-notes
